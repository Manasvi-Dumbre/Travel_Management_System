{% extends "base.html" %}

{% block title %}Language Translator{% endblock %}

{% block content %}
<div class="translator-container">
    <h2>Language Translator</h2>
    <div class="translator-box">
        <div class="translator-form">
            <div class="text-input">
                <textarea id="sourceText" placeholder="Enter text to translate"></textarea>
                <div class="source-lang">
                    <select id="sourceLang" class="lang-select">
                        <option value="auto">Detect Language</option>
                        <option value="en">English</option>
                        <option value="mr">Marathi</option>
                        <option value="hi">Hindi</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                        <option value="zh">Chinese</option>
                    </select>
                </div>
            </div>
            <div class="text-output">
                <textarea id="translatedText" readonly placeholder="Translation"></textarea>
                <select id="targetLang" class="lang-select">
                    <option value="en">English</option>
                    <option value="mr">Marathi</option>
                    <option value="hi">Hindi</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ru">Russian</option>
                    <option value="ar">Arabic</option>
                    <option value="zh">Chinese</option>
                </select>
            </div>
        </div>
        <button onclick="translateText()" class="translate-btn">Translate</button>
    </div>
</div>

<!-- Add Google Translate API -->
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
let translator;

function googleTranslateElementInit() {
    translator = new google.translate.TranslateElement({
        pageLanguage: 'auto',
        autoDisplay: false
    });
}

async function translateText() {
    const text = document.getElementById('sourceText').value;
    const sourceLang = document.getElementById('sourceLang').value;
    const targetLang = document.getElementById('targetLang').value;
    
    if (!text) return;

    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        
        let translatedText = '';
        data[0].forEach(item => {
            if (item[0]) translatedText += item[0];
        });
        
        document.getElementById('translatedText').value = translatedText;
    } catch (error) {
        console.error('Translation error:', error);
        document.getElementById('translatedText').value = 'Translation error occurred. Please try again.';
    }
}

// Auto translate as user types (with debounce)
let timeout = null;
document.getElementById('sourceText').addEventListener('input', function() {
    clearTimeout(timeout);
    timeout = setTimeout(translateText, 1000); // Wait 1 second after user stops typing
});
</script>
{% endblock %}
